<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFTK Analysis Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1917; --ink2: #3d3b37; --ink3: #7a776f;
    --paper: #f7f5f0; --paper2: #efece5; --paper3: #e5e1d8;
    --rule: #d4cfc4;
    --teal: #1D7A63; --teal-l: #d0ede7;
    --coral: #c05a2c; --coral-l: #f5ddd1;
    --amber: #b07a18; --amber-l: #f5e9cc;
    --purple: #5a4a8a; --purple-l: #e0daf0;
    --accent: #1D7A63;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', 'Courier New', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--sans); font-size: 14px; line-height: 1.7;
         color: var(--ink2); background: var(--paper); -webkit-font-smoothing: antialiased; }

  .layout { display: flex; min-height: 100vh; }

  /* sidebar */
  .sidebar { width: 220px; flex-shrink: 0; background: var(--ink); color: #c8c4bb;
             position: sticky; top: 0; height: 100vh; overflow-y: auto;
             padding: 32px 0 48px; display: flex; flex-direction: column; }
  .sidebar-brand { padding: 0 24px 28px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .sidebar-brand .logo { font-family: var(--serif); font-size: 22px; color: #f0ede8;
                          letter-spacing: 0.02em; display: block; }
  .sidebar-brand .tagline { font-size: 11px; font-weight: 300; color: #7a776f;
                             margin-top: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
  .nav-section { padding: 20px 0 4px; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
               text-transform: uppercase; color: #5a5850; padding: 0 24px; margin-bottom: 4px; }
  .nav-link { display: flex; align-items: center; gap: 10px; padding: 7px 24px;
              color: #a09c94; text-decoration: none; font-size: 13px;
              transition: background 0.15s, color 0.15s;
              border-left: 2px solid transparent; }
  .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.05);
                                       color: #f0ede8; border-left-color: var(--teal); }
  .nav-link .dot { width: 6px; height: 6px; border-radius: 50%;
                   background: currentColor; opacity: 0.4; flex-shrink: 0; }
  .sidebar-meta { margin-top: auto; padding: 20px 24px 0;
                  border-top: 1px solid rgba(255,255,255,0.06);
                  font-size: 11px; color: #4a4840; line-height: 1.8; }

  /* main */
  .main { flex: 1; min-width: 0; }
  .page-header { background: var(--ink); color: #f0ede8; padding: 52px 64px 44px;
                 position: relative; overflow: hidden; }
  .page-header::before { content:''; position:absolute; right:-60px; top:-60px;
                          width:340px; height:340px; border-radius:50%;
                          border:1px solid rgba(255,255,255,0.04); }
  .header-kicker { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
                   color: var(--teal); font-weight: 500; margin-bottom: 12px; }
  .header-title { font-family: var(--serif); font-size: 38px; line-height: 1.15;
                  color: #f7f5f0; max-width: 640px; margin-bottom: 16px; }
  .header-meta { display: flex; gap: 28px; font-size: 12px; color: #7a776f; flex-wrap: wrap; }
  .header-meta span { display: flex; align-items: center; gap: 6px; }
  .header-meta strong { color: #c8c4bb; }
  .header-badges { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 10px;
           border-radius: 3px; letter-spacing: 0.04em; }
  .badge-teal   { background: rgba(29,122,99,0.25); color: #5bc4a8; }
  .badge-coral  { background: rgba(192,90,44,0.25); color: #e8906a; }
  .badge-amber  { background: rgba(176,122,24,0.25); color: #d4a850; }
  .badge-purple { background: rgba(90,74,138,0.25); color: #a090d0; }

  .content { padding: 48px 64px 80px; max-width: 1100px; }

  .section { margin-bottom: 64px; scroll-margin-top: 24px; }
  .section-header { display: flex; align-items: baseline; gap: 16px;
                    margin-bottom: 28px; padding-bottom: 14px;
                    border-bottom: 1px solid var(--rule); }
  .section-num { font-family: var(--mono); font-size: 11px; font-weight: 500;
                 color: var(--ink3); letter-spacing: 0.08em; }
  .section-title { font-family: var(--serif); font-size: 22px;
                   color: var(--ink); font-weight: 400; }
  .section-tag { margin-left: auto; font-size: 11px; color: var(--ink3);
                 font-family: var(--mono); padding: 2px 8px;
                 background: var(--paper2); border-radius: 3px; }

  /* figure cards */
  .fig-grid { display: grid; gap: 20px; }
  .fig-grid.cols-1 { grid-template-columns: 1fr; }
  .fig-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .fig-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .fig-card { background: white; border: 1px solid var(--rule);
              border-radius: 8px; overflow: hidden; }
  .fig-img { width: 100%; height: 240px; background: var(--paper2);
             display: flex; align-items: center; justify-content: center;
             overflow: hidden; }
  .fig-img.tall { height: 320px; }
  .fig-img img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
  .fig-placeholder { display: flex; align-items: center; justify-content: center;
                     width: 100%; height: 100%; color: var(--ink3); }
  .fig-placeholder .hint { font-size: 11px; font-family: var(--mono); }
  .fig-body { padding: 14px 18px 16px; }
  .fig-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
               text-transform: uppercase; color: var(--ink3); margin-bottom: 4px;
               font-family: var(--mono); }
  .fig-caption { font-size: 13px; color: var(--ink2); line-height: 1.55; }

  /* result table */
  .result-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 16px; }
  .result-table th { font-weight: 500; font-size: 11px; letter-spacing: 0.08em;
                     text-transform: uppercase; color: var(--ink3); text-align: left;
                     padding: 10px 14px; border-bottom: 1px solid var(--rule);
                     background: var(--paper2); font-family: var(--mono); }
  .result-table td { padding: 10px 14px; border-bottom: 1px solid var(--paper3); color: var(--ink2); }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table tr:hover td { background: var(--paper2); }

  /* callout */
  .callout { border-left: 3px solid var(--teal); padding: 14px 20px;
             background: var(--teal-l); border-radius: 0 6px 6px 0;
             margin: 20px 0; font-size: 13px; color: var(--ink2); }

  /* footer */
  .report-footer { border-top: 1px solid var(--rule); padding: 24px 64px;
                   font-size: 11.5px; color: var(--ink3); display: flex;
                   justify-content: space-between; align-items: center;
                   gap: 16px; flex-wrap: wrap; background: var(--paper2); }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .page-header, .content { padding-left: 24px; padding-right: 24px; }
    .fig-grid.cols-2, .fig-grid.cols-3 { grid-template-columns: 1fr; }
    .report-footer { padding: 20px 24px; }
  }
</style>
</head>
<body>
<div class="layout">

  <!-- sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <span class="logo">CFTK</span>
      <span class="tagline">Analysis Report</span>
    </div>
    <div class="nav-section">
      <div class="nav-label">Analysis</div>
      <a href="#part0" class="nav-link"><span class="dot"></span>0 · Power</a>
      <a href="#part1" class="nav-link"><span class="dot"></span>1 · Processing</a>
      <a href="#part2" class="nav-link"><span class="dot"></span>2 · QC</a>
      <a href="#part3" class="nav-link"><span class="dot"></span>3 · Differential</a>
      <a href="#part4" class="nav-link"><span class="dot"></span>4 · Fragmentomics</a>
      <a href="#part5" class="nav-link"><span class="dot"></span>5 · MESA</a>
    </div>
    <div class="sidebar-meta">
      Generated by CFTK v1.0<br>
      <!-- {REPORT_DATE} -->
    </div>
  </nav>

  <!-- main -->
  <div class="main">
    <header class="page-header">
      <div class="header-kicker">cfDNA Multimodal Epigenetic Analysis</div>
      <h1 class="header-title">CFTK Analysis Report</h1>
      <div class="header-meta">
        <span>Project <strong><!-- {PROJECT_NAME} --></strong></span>
        <span>Groups <strong><!-- {GROUPS} --></strong></span>
        <span>Date <strong><!-- {DATE} --></strong></span>
      </div>
      <div class="header-badges">
        <span class="badge badge-teal">Methylation</span>
        <span class="badge badge-coral">Fragmentomics</span>
        <span class="badge badge-amber">DMR</span>
        <span class="badge badge-purple">MESA</span>
      </div>
    </header>

    <div class="content">
      <!-- {SECTIONS} -->
    </div>

    <footer class="report-footer">
      <div>Generated by <strong>CFTK</strong> v1.0 &nbsp;·&nbsp;
           <!-- {REPORT_DATE} --> &nbsp;·&nbsp; hg38 reference</div>
    </footer>
  </div>
</div>

<script>
  const sections = document.querySelectorAll('.section');
  const navLinks = document.querySelectorAll('.nav-link');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navLinks.forEach(l => l.classList.remove('active'));
        const a = document.querySelector(`.nav-link[href="#${e.target.id}"]`);
        if (a) a.classList.add('active');
      }
    });
  }, { threshold: 0.3 });
  sections.forEach(s => obs.observe(s));
</script>
</body>
</html>
